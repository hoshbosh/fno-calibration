data:
  train_path: data/heston_train_100k.h5
  val_path: data/heston_val_10k.h5
  test_path: data/heston_test_10k.h5
  ood_path: data/heston_ood_5k.h5
  seed: 42

heston: 
  kappa: [0.5, 5.0]
  theta: [0.02, 0.15]
  xi: [0.1, 1.0]
  rho: [-0.95, -0.3]
  v0: [0.01, 0.12]
  s0: 1.0
  r: 0.02
  q: 0.0

grid:
  n_k: 16
  k_min: -0.5
  k_max: 0.5
  k_atm: 0.1
  n_k_wing: 4
  n_k_atm: 8
  n_tau: 20
  tau_min: 0.02
  tau_max: 2.0

fno:
  in_channel: 3
  hidden_channels: 64
  # modes1 capped at n_k // 2 = 8 to avoid the overlap bug
  # (slices [:m1] and [-m1:] would otherwise overlap and the second write
  # silently overwrites the first, leaving rows of weights1 dead).
  layer_modes:
    - [8, 8]
    - [8, 7]
    - [8, 6]
    - [6, 5]
  n_blocks: 4
  proj_channels: 128
  pool_size: [4, 5]
  head_hidden: [256, 64]
  out_dim: 5

mlp:
  in_dim: 320
  # Widened from [512, 256, 128] (~329k params) to ~2.4M params to
  # match the FNO param count for an apples-to-apples architectural comparison.
  hidden: [1024, 1024, 1024]
  out_dim: 5

train:
  batch_size: 64
  early_stopping_patience: 30
  grad_clip: 1.0
  epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-4
  num_workers: 2

wandb:
  project: fno-calibration
  entity: null

checkpoint_dir: checkpoints

